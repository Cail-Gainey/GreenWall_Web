name: Build Clients

on:
  push:
    branches: [ frontend ]
    tags: [ '*' ]
  pull_request:
    branches: [ frontend ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install Dependencies
        run: pnpm install
        
      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            pnpm build:electron --linux -p never
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pnpm build:electron --win -p never
          else
            pnpm build:electron --mac -p never
          fi
        shell: bash
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore
          
      - name: Upload Desktop to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install Dependencies
        run: pnpm install
        
      - name: Build Front-End
        run: pnpm build
        
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          
      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
